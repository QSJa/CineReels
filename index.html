<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CineReels</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #18181c; --surface2: #22222a;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.18);
    --text: #f0f0f0; --muted: #888; --accent: #e2a84b; --accent2: #c97c1a;
    --red: #e05252; --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  #app { max-width: 860px; margin: 0 auto; padding: 0 1rem 4rem; }

  /* AUTH */
  .screen { display: none; }
  .screen.active { display: block; }
  .auth-wrap { max-width: 360px; margin: 4rem auto; }
  .logo { font-size: 26px; font-weight: 700; letter-spacing: 2px; color: var(--accent); margin-bottom: 0.4rem; }
  .logo span { color: var(--muted); font-weight: 400; }
  .tagline { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
  .auth-tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .auth-tab { flex: 1; padding: 0.65rem; text-align: center; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; }
  .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: #111; border: none; border-radius: var(--radius); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: var(--accent2); }
  .err { color: var(--red); font-size: 12px; margin-top: 0.5rem; min-height: 18px; }

  /* NAV */
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  .nav-logo { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
  .nav-links { display: flex; gap: 4px; }
  .nav-link { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 7px 14px; border-radius: 7px; transition: all 0.15s; }
  .nav-link:hover, .nav-link.active { background: var(--surface2); color: var(--text); }
  .nav-user { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .logout-btn { background: none; border: 1px solid var(--border2); color: var(--muted); font-size: 11px; cursor: pointer; padding: 5px 12px; border-radius: 6px; transition: all 0.15s; }
  .logout-btn:hover { color: var(--text); border-color: var(--text); }

  /* TABS */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ADD BOX */
  .add-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 2rem; }
  .add-box-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 0.5rem; }
  .search-bar input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.2s; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar button { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .search-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .status { font-size: 12px; color: var(--muted); min-height: 20px; padding: 2px 0; }
  .results-list { display: flex; flex-direction: column; gap: 5px; max-height: 210px; overflow-y: auto; margin-bottom: 0.5rem; }
  .result-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); transition: border-color 0.15s; }
  .result-item:hover, .result-item.sel { border-color: var(--accent); }
  .result-item img { width: 28px; height: 40px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
  .ri-placeholder { width: 28px; height: 40px; background: var(--bg); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .ri-title { font-size: 13px; font-weight: 500; }
  .ri-year { font-size: 11px; color: var(--muted); }
  .manual-fields { display: flex; gap: 8px; margin-bottom: 0.5rem; }
  .manual-fields input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none; }
  .manual-fields input:focus { border-color: var(--accent); }
  .manual-link { font-size: 12px; color: var(--muted); text-decoration: underline; cursor: pointer; display: inline-block; margin-bottom: 1rem; }
  .rating-row { display: flex; align-items: center; gap: 14px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .rating-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .rating-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .rating-num { font-size: 20px; font-weight: 600; color: var(--accent); min-width: 40px; }
  .add-btn { background: var(--accent); color: #111; border: none; border-radius: 8px; padding: 10px 22px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .add-btn:hover { background: var(--accent2); }

  /* TOP 3 */
  .section-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .top3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 2.5rem; }
  .banner-card { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; background: var(--surface); }
  .banner-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .banner-placeholder { width: 100%; aspect-ratio: 2/3; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .banner-rank { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.85); border-radius: 5px; padding: 3px 8px; font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .banner-info { padding: 10px 12px; }
  .banner-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .banner-bottom { display: flex; align-items: center; justify-content: space-between; }
  .banner-score { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
  .banner-stars { font-size: 11px; }

  /* MOVIE LIST */
  .movie-list { display: flex; flex-direction: column; gap: 8px; }
  .movie-row { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.15s; }
  .movie-row:hover { border-color: var(--border2); }
  .movie-num { width: 24px; font-size: 13px; color: var(--muted); text-align: center; flex-shrink: 0; }
  .movie-thumb { width: 36px; height: 52px; border-radius: 4px; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; }
  .movie-thumb img { width: 36px; height: 52px; object-fit: cover; display: block; }
  .movie-info { flex: 1; min-width: 0; }
  .movie-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-year { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .score-badge { background: var(--accent); color: #111; border-radius: 7px; padding: 4px 10px; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 4px 6px; border-radius: 5px; transition: all 0.15s; }
  .del-btn:hover { color: var(--red); background: rgba(224,82,82,0.1); }

  /* FRIENDS */
  .friends-grid { display: grid; grid-template-columns: 220px 1fr; gap: 1.5rem; }
  .friends-sidebar-title { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; }
  .friend-card { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px; cursor: pointer; margin-bottom: 6px; transition: border-color 0.15s; }
  .friend-card:hover, .friend-card.active { border-color: var(--accent); }
  .f-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #111; flex-shrink: 0; }
  .f-name { font-size: 13px; font-weight: 500; }
  .f-count { font-size: 11px; color: var(--muted); }
  .add-friend-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-friend-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 10px; color: var(--text); font-size: 12px; outline: none; transition: border-color 0.2s; }
  .add-friend-row input:focus { border-color: var(--accent); }
  .add-friend-row button { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 9px 14px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .add-friend-row button:hover { border-color: var(--accent); color: var(--accent); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 2.5rem 0; }
  .no-friend { color: var(--muted); font-size: 14px; text-align: center; margin-top: 4rem; }

  @media (max-width: 600px) {
    .top3 { grid-template-columns: repeat(2, 1fr); }
    .friends-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- AUTH -->
  <div id="screen-auth" class="screen active">
    <div class="auth-wrap">
      <div class="logo">CINE<span>REELS</span></div>
      <div class="tagline">Rate and rank your films.</div>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('login')">Sign in</div>
        <div class="auth-tab" onclick="switchAuthTab('signup')">Create account</div>
      </div>
      <div class="field"><label>Username</label><input id="au" type="text" placeholder="e.g. filmfan42" /></div>
      <div class="field"><label>Password</label><input id="ap" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')auth()" /></div>
      <div class="err" id="aerr"></div>
      <button class="btn-primary" id="auth-btn" onclick="auth()">Sign in</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="screen-main" class="screen">
    <div class="nav">
      <div class="nav-logo">CINEREELS</div>
      <div class="nav-links">
        <button class="nav-link active" onclick="goTab('mylist',this)">My List</button>
        <button class="nav-link" onclick="goTab('friends',this)">Friends</button>
      </div>
      <div class="nav-user">
        <span id="nav-u"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>

    <!-- MY LIST -->
    <div id="tab-mylist" class="tab-content active">
      <div class="add-box">
        <div class="add-box-title">Add a movie</div>
        <div id="search-mode">
          <div class="search-bar">
            <input id="sq" type="text" placeholder="Search by title..." onkeydown="if(event.key==='Enter')doSearch()" />
            <button onclick="doSearch()">Search</button>
          </div>
          <div class="status" id="sstatus"></div>
          <div class="results-list" id="sresults"></div>
        </div>
        <div id="manual-mode" style="display:none;">
          <div class="manual-fields">
            <input id="mt" type="text" placeholder="Movie title" />
            <input id="my" type="text" placeholder="Year" style="max-width:90px;" />
          </div>
        </div>
        <span class="manual-link" id="manual-link" onclick="toggleManual()">Enter manually instead</span>
        <div class="rating-row">
          <label>Rating</label>
          <input type="range" id="rslider" min="1" max="10" step="0.1" value="7" oninput="updateR()" />
          <span class="rating-num" id="rnum">7.0</span>
          <button class="add-btn" onclick="addMovie()">Add</button>
        </div>
      </div>

      <div class="section-title">Top rated</div>
      <div class="top3" id="top3"></div>
      <div class="section-title" style="margin-top:2rem;">All films</div>
      <div class="movie-list" id="mlist"></div>
    </div>

    <!-- FRIENDS -->
    <div id="tab-friends" class="tab-content">
      <div class="friends-grid">
        <div>
          <div class="friends-sidebar-title">Friends</div>
          <div id="flist"></div>
          <div class="add-friend-row">
            <input id="fi" type="text" placeholder="Username..." onkeydown="if(event.key==='Enter')addFriend()" />
            <button onclick="addFriend()">Add</button>
          </div>
          <div class="err" id="ferr"></div>
          <div class="hint">Friends must have an account saved in the same browser.</div>
        </div>
        <div id="fview"><div class="no-friend">Select a friend to view their list</div></div>
      </div>
    </div>
  </div>

</div>

<script>
  let S = { user: null, mode: 'login', results: [], selected: null, manual: false, friendSel: null };

  const DB = {
    get()       { try { return JSON.parse(localStorage.getItem('cr3') || '{"u":{},"p":{},"f":{}}'); } catch(e) { return {u:{},p:{},f:{}}; } },
    save(d)     { try { localStorage.setItem('cr3', JSON.stringify(d)); } catch(e) {} },
    movies(u)   { return this.get().u[u] || []; },
    saveMovies(u,m) { const d=this.get(); d.u[u]=m; this.save(d); },
    friends(u)  { return this.get().f[u] || []; },
    saveFriends(u,f){ const d=this.get(); d.f[u]=f; this.save(d); },
    exists(u)   { return this.get().u.hasOwnProperty(u); },
    checkPw(u,p){ return this.get().p[u]===p; }
  };

  function switchAuthTab(m) {
    S.mode = m;
    document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(m==='login'?0:1)===i));
    document.getElementById('auth-btn').textContent = m==='login' ? 'Sign in' : 'Create account';
    document.getElementById('aerr').textContent = '';
  }

  function auth() {
    const u = document.getElementById('au').value.trim();
    const p = document.getElementById('ap').value;
    const err = document.getElementById('aerr');
    if (!u||!p) { err.textContent='Fill in all fields.'; return; }
    if (S.mode==='signup') {
      if (DB.exists(u)) { err.textContent='Username already taken.'; return; }
      const d=DB.get(); d.u[u]=[]; d.p[u]=p; d.f[u]=[]; DB.save(d);
    } else {
      if (!DB.exists(u)) { err.textContent='No account found. Create one first.'; return; }
      if (!DB.checkPw(u,p)) { err.textContent='Incorrect password.'; return; }
    }
    S.user=u;
    document.getElementById('nav-u').textContent=u;
    document.getElementById('screen-auth').classList.remove('active');
    document.getElementById('screen-main').classList.add('active');
    renderList(); renderFriends();
  }

  function logout() {
    S.user=null;
    document.getElementById('screen-main').classList.remove('active');
    document.getElementById('screen-auth').classList.add('active');
    document.getElementById('au').value='';
    document.getElementById('ap').value='';
  }

  function goTab(t,btn) {
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(x=>x.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    btn.classList.add('active');
  }

  async function doSearch() {
    const q = document.getElementById('sq').value.trim();
    if (!q) return;
    const status = document.getElementById('sstatus');
    const container = document.getElementById('sresults');
    status.textContent = 'Searching...';
    container.innerHTML = '';
    S.results=[]; S.selected=null;
    try {
      const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&type=movie&apikey=trilogy`);
      const data = await res.json();
      if (data.Response==='True' && data.Search) {
        S.results = data.Search.slice(0,7);
        status.textContent = '';
        container.innerHTML = S.results.map((m,i)=>{
          const img = m.Poster && m.Poster!=='N/A'
            ? `<img src="${m.Poster}" onerror="this.outerHTML='<div class=ri-placeholder>🎬</div>'" />`
            : `<div class="ri-placeholder">🎬</div>`;
          return `<div class="result-item" id="ri${i}" onclick="selResult(${i})">${img}<div><div class="ri-title">${m.Title}</div><div class="ri-year">${m.Year}</div></div></div>`;
        }).join('');
      } else {
        status.textContent = data.Error || 'No results. Try manual entry.';
      }
    } catch(e) {
      status.textContent = 'Search unavailable — use manual entry below.';
    }
  }

  function selResult(i) {
    S.selected = S.results[i];
    document.querySelectorAll('.result-item').forEach((el,j)=>el.classList.toggle('sel',i===j));
  }

  function toggleManual() {
    S.manual = !S.manual;
    document.getElementById('manual-mode').style.display = S.manual ? 'block' : 'none';
    document.getElementById('search-mode').style.display  = S.manual ? 'none' : 'block';
    document.getElementById('manual-link').textContent = S.manual ? 'Search instead' : 'Enter manually instead';
    S.selected=null;
  }

  function updateR() {
    document.getElementById('rnum').textContent = parseFloat(document.getElementById('rslider').value).toFixed(1);
  }

  function addMovie() {
    const rating = parseFloat(document.getElementById('rslider').value);
    let movie;
    if (S.manual) {
      const t=document.getElementById('mt').value.trim();
      const y=document.getElementById('my').value.trim();
      if (!t) return;
      movie = { title:t, year:y, poster:null };
    } else {
      if (!S.selected) return;
      const m=S.selected;
      movie = { title:m.Title, year:m.Year, poster:(m.Poster&&m.Poster!=='N/A')?m.Poster:null };
    }
    const movies = DB.movies(S.user);
    movies.push({ ...movie, rating, id:Date.now() });
    movies.sort((a,b)=>b.rating-a.rating);
    DB.saveMovies(S.user, movies);
    S.selected=null;
    document.getElementById('sq').value='';
    document.getElementById('sresults').innerHTML='';
    document.getElementById('sstatus').textContent='';
    if (S.manual) { document.getElementById('mt').value=''; document.getElementById('my').value=''; }
    renderList();
  }

  function delMovie(id) {
    DB.saveMovies(S.user, DB.movies(S.user).filter(m=>m.id!==id));
    renderList();
  }

  function stars(r) {
    if (r>=9) return '⭐⭐⭐⭐⭐';
    if (r>=8) return '⭐⭐⭐⭐';
    if (r>=6.5) return '⭐⭐⭐';
    if (r>=5) return '⭐⭐';
    return '⭐';
  }

  function renderList() {
    const movies = DB.movies(S.user);
    const top = movies.slice(0,3);
    document.getElementById('top3').innerHTML = top.length ? top.map((m,i)=>{
      const img = m.poster
        ? `<img class="banner-img" src="${m.poster}" onerror="this.outerHTML='<div class=banner-placeholder>🎬</div>'" />`
        : `<div class="banner-placeholder">🎬</div>`;
      return `<div class="banner-card">${img}
        <div class="banner-rank">#${i+1}</div>
        <div class="banner-info">
          <div class="banner-title">${m.title}</div>
          <div class="banner-bottom">
            <span class="banner-score">${m.rating.toFixed(1)}</span>
            <span class="banner-stars">${stars(m.rating)}</span>
          </div>
        </div>
      </div>`;
    }).join('') : '<div class="empty" style="grid-column:1/-1;padding:1.5rem 0;">Rate some movies to see your top 3 here!</div>';

    document.getElementById('mlist').innerHTML = movies.length ? movies.map((m,i)=>{
      const thumb = m.poster
        ? `<div class="movie-thumb"><img src="${m.poster}" onerror="this.parentElement.innerHTML='🎬'" /></div>`
        : `<div class="movie-thumb">🎬</div>`;
      const s = i<3 ? `<span style="font-size:11px;margin-left:6px;">${stars(m.rating)}</span>` : '';
      return `<div class="movie-row">
        <div class="movie-num">${i+1}</div>
        ${thumb}
        <div class="movie-info">
          <div class="movie-name">${m.title}${s}</div>
          <div class="movie-year">${m.year||''}</div>
        </div>
        <div class="score-badge">${m.rating.toFixed(1)}</div>
        <button class="del-btn" onclick="delMovie(${m.id})" title="Remove">✕</button>
      </div>`;
    }).join('') : '<div class="empty">No films yet — add one above!</div>';
  }

  function addFriend() {
    const u = document.getElementById('fi').value.trim();
    const err = document.getElementById('ferr');
    if (!u) return;
    if (u===S.user) { err.textContent="That's you!"; return; }
    if (!DB.exists(u)) { err.textContent='No account with that username found.'; return; }
    const f = DB.friends(S.user);
    if (f.includes(u)) { err.textContent='Already added!'; return; }
    f.push(u); DB.saveFriends(S.user,f);
    document.getElementById('fi').value=''; err.textContent='';
    renderFriends();
  }

  function renderFriends() {
    const friends = DB.friends(S.user);
    document.getElementById('flist').innerHTML = friends.length ? friends.map(f=>{
      const c=DB.movies(f).length;
      return `<div class="friend-card ${S.friendSel===f?'active':''}" onclick="viewFriend('${f}')">
        <div class="f-avatar">${f.slice(0,2).toUpperCase()}</div>
        <div><div class="f-name">${f}</div><div class="f-count">${c} film${c!==1?'s':''}</div></div>
      </div>`;
    }).join('') : '<div class="empty" style="padding:1rem 0;text-align:left;">No friends yet.</div>';
  }

  function viewFriend(u) {
    S.friendSel=u; renderFriends();
    const movies = DB.movies(u);
    const top = movies.slice(0,3);
    const topHtml = top.length ? `<div class="top3" style="margin-bottom:1.5rem;">${top.map((m,i)=>{
      const img = m.poster
        ? `<img class="banner-img" src="${m.poster}" onerror="this.outerHTML='<div class=banner-placeholder>🎬</div>'" />`
        : `<div class="banner-placeholder">🎬</div>`;
      return `<div class="banner-card">${img}<div class="banner-rank">#${i+1}</div><div class="banner-info"><div class="banner-title">${m.title}</div><div class="banner-bottom"><span class="banner-score">${m.rating.toFixed(1)}</span><span class="banner-stars">${stars(m.rating)}</span></div></div></div>`;
    }).join('')}</div>` : '';
    const listHtml = movies.length ? `<div class="movie-list">${movies.map((m,i)=>{
      const thumb = m.poster ? `<div class="movie-thumb"><img src="${m.poster}" onerror="this.parentElement.innerHTML='🎬'" /></div>` : `<div class="movie-thumb">🎬</div>`;
      const s = i<3 ? `<span style="font-size:11px;margin-left:6px;">${stars(m.rating)}</span>` : '';
      return `<div class="movie-row"><div class="movie-num">${i+1}</div>${thumb}<div class="movie-info"><div class="movie-name">${m.title}${s}</div><div class="movie-year">${m.year||''}</div></div><div class="score-badge">${m.rating.toFixed(1)}</div></div>`;
    }).join('')}</div>` : '<div class="empty">No films rated yet.</div>';
    document.getElementById('fview').innerHTML = `<div class="section-title">${u}'s list</div>${topHtml}${listHtml}`;
  }

  updateR();
</script>
</body>
</html>
